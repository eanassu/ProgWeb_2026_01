<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de CSS</title>
    <style>
        .center{
            text-align: center;
        }
        h1.center {
            color: red;
        }
        .left {
            text-align: left;
        }
        .right {
            text-align: right;
        }
    </style>
</head>
<body>
    <h1 class="left">Cabeçalho</h1>
    <p class="left">Texto do parágrafo Texto do parágrafo
    </p>
    <h1 class="center">Outro cabeçalho</h1>
    <p class="center">
      Texto do parágrafo Texto do parágrafo
    </p>
    <h1 class="right">Outro cabeçalho</h1>
    <p class="right">
      Texto do parágrafo Texto do parágrafo
    </p>

</body>
</html>
